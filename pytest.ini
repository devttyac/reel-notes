[pytest]
markers =
    live: requires network access (yt-dlp downloads, oEmbed, Anthropic, Groq)
    paid: spends API credits (Anthropic and/or Groq); implies live
    slow: takes >30s (chunking, --visual)
    youtube: hits youtube.com via yt-dlp; auto-skipped under GitHub Actions (runner IPs are bot-blocked)
testpaths = tests
addopts = -ra
